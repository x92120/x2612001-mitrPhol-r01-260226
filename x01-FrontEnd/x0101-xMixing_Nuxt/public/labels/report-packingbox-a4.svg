<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="794" height="1123"
   viewBox="0 0 794 1123"
   version="1.1"
   id="report-packingbox-a4"
   xmlns="http://www.w3.org/2000/svg">

  <!-- ── Page Border ── -->
  <rect x="20" y="20" width="754" height="1083" rx="4"
        fill="none" stroke="#000000" stroke-width="1.5" />
  <rect x="24" y="24" width="746" height="1075" rx="3"
        fill="none" stroke="#000000" stroke-width="0.4" />

  <!-- ── Header Bar ── -->
  <rect x="20" y="20" width="754" height="72" rx="4" fill="#000000" />

  <!-- Company logo area -->
  <rect x="32" y="30" width="80" height="52" rx="3"
        fill="#ffffff" fill-opacity="0.12" />
  <text x="72" y="52" text-anchor="middle"
        style="font-size:9px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff;letter-spacing:0.5px">MITR PHOL</text>
  <text x="72" y="64" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#cccccc">Sugar Group</text>

  <!-- Report title -->
  <text x="397" y="48" text-anchor="middle"
        style="font-size:18px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff;letter-spacing:2px">PACKING BOX DETAIL REPORT</text>
  <text x="397" y="66" text-anchor="middle"
        style="font-size:10px;font-family:Arial,sans-serif;fill:#cccccc;letter-spacing:1px">รายงานรายละเอียดกล่องบรรจุ Pre-Batch</text>

  <!-- Report meta (right) -->
  <text x="758" y="42" text-anchor="end"
        style="font-size:8px;font-family:'Courier New',monospace;fill:#cccccc">Report No:</text>
  <text x="758" y="54" text-anchor="end"
        style="font-size:9px;font-family:'Courier New',monospace;font-weight:bold;fill:#ffffff">{{ReportNo}}</text>
  <text x="758" y="68" text-anchor="end"
        style="font-size:8px;font-family:'Courier New',monospace;fill:#cccccc">{{PrintDate}}</text>

  <!-- ── Meta Info Row ── -->
  <rect x="20" y="92" width="754" height="40" fill="#f0f0f0" />

  <text x="36" y="108" style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">BATCH ID</text>
  <text x="36" y="124" style="font-size:13px;font-family:'Courier New',monospace;font-weight:bold;fill:#000000">{{BatchId}}</text>

  <line x1="240" y1="96" x2="240" y2="128" stroke="#cccccc" stroke-width="0.5"/>
  <text x="252" y="108" style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">SKU</text>
  <text x="252" y="124" style="font-size:11px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{SkuName}}</text>

  <line x1="480" y1="96" x2="480" y2="128" stroke="#cccccc" stroke-width="0.5"/>
  <text x="492" y="108" style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">WAREHOUSE</text>
  <text x="492" y="124" style="font-size:13px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{Warehouse}}</text>

  <line x1="580" y1="96" x2="580" y2="128" stroke="#cccccc" stroke-width="0.5"/>
  <text x="592" y="108" style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">PLANT</text>
  <text x="592" y="124" style="font-size:11px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{Plant}}</text>

  <line x1="680" y1="96" x2="680" y2="128" stroke="#cccccc" stroke-width="0.5"/>
  <text x="692" y="108" style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">BOX CLOSED</text>
  <text x="692" y="124" style="font-size:11px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{BoxClosedTime}}</text>

  <line x1="20" y1="132" x2="774" y2="132" stroke="#000000" stroke-width="1"/>

  <!-- ── Summary Row ── -->
  <rect x="20" y="136" width="754" height="30" fill="#e8f0fe" />
  <text x="36" y="156" style="font-size:9px;font-family:Arial,sans-serif;font-weight:bold;fill:#1a73e8">
    TOTAL: {{TotalBags}} bags · {{TotalWeight}} kg · {{TotalIngredients}} ingredients
  </text>
  <line x1="20" y1="166" x2="774" y2="166" stroke="#000000" stroke-width="1"/>

  <!-- ── Table Header ── -->
  <rect x="20" y="170" width="754" height="22" fill="#000000" />
  <text x="38"  y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">#</text>
  <text x="56"  y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">RE-Code</text>
  <text x="150" y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">Ingredient Name</text>
  <text x="380" y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">Batch Record ID</text>
  <text x="560" y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">Pkg</text>
  <text x="600" y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">Net Volume (kg)</text>
  <text x="710" y="185" style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff">Status</text>

  <!-- Column dividers in header -->
  <line x1="50"  y1="170" x2="50"  y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>
  <line x1="144" y1="170" x2="144" y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>
  <line x1="374" y1="170" x2="374" y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>
  <line x1="554" y1="170" x2="554" y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>
  <line x1="594" y1="170" x2="594" y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>
  <line x1="702" y1="170" x2="702" y2="192" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.3"/>

  <!-- ── Table Rows (injected at print time) ── -->
  {{PackingBoxRows}}

  <!-- ── Footer Divider ── -->
  <line x1="20" y1="990" x2="774" y2="990" stroke="#000000" stroke-width="1"/>

  <!-- ── Signature Section ── -->
  <rect x="20" y="994" width="754" height="100" fill="#f8f8f8" />

  <!-- Prepared by -->
  <text x="88" y="1018" text-anchor="middle"
        style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">PREPARED BY</text>
  <line x1="36" y1="1055" x2="140" y2="1055" stroke="#000000" stroke-width="0.8"/>
  <text x="88" y="1068" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Operator / ผู้จัดเตรียม</text>
  <text x="88" y="1080" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Date: ________________</text>

  <!-- Checked by -->
  <text x="280" y="1018" text-anchor="middle"
        style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">CHECKED BY</text>
  <line x1="212" y1="1055" x2="348" y2="1055" stroke="#000000" stroke-width="0.8"/>
  <text x="280" y="1068" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Supervisor / หัวหน้างาน</text>
  <text x="280" y="1080" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Date: ________________</text>

  <!-- Received by -->
  <text x="514" y="1018" text-anchor="middle"
        style="font-size:8px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">RECEIVED BY</text>
  <line x1="440" y1="1055" x2="588" y2="1055" stroke="#000000" stroke-width="0.8"/>
  <text x="514" y="1068" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Receiver / ผู้รับ</text>
  <text x="514" y="1080" text-anchor="middle"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#666666">Date: ________________</text>

  <!-- QR placeholder -->
  <rect x="660" y="1000" width="94" height="80" rx="3"
        fill="#ffffff" stroke="#000000" stroke-width="0.8"/>
  <g transform="translate(676, 1008) scale(0.42)">
    {{BoxQRCode}}
  </g>

  <!-- vertical separators in sig section -->
  <line x1="188" y1="994" x2="188" y2="1094" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="400" y1="994" x2="400" y2="1094" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="648" y1="994" x2="648" y2="1094" stroke="#cccccc" stroke-width="0.5"/>

  <line x1="20" y1="1094" x2="774" y2="1094" stroke="#000000" stroke-width="1"/>

  <!-- ── Page Footer ── -->
  <text x="36"  y="1110"
        style="font-size:7px;font-family:Arial,sans-serif;fill:#888888">xMixing System — Packing Box Detail Report</text>
  <text x="758" y="1110" text-anchor="end"
        style="font-size:7px;font-family:'Courier New',monospace;font-weight:bold;fill:#000000">xDev.co.th</text>

</svg>
