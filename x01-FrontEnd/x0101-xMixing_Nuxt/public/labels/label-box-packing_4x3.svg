<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="384"
   height="288"
   viewBox="0 0 384 288"
   version="1.1"
   id="svg-box-packing-4x3"
   xmlns="http://www.w3.org/2000/svg">
<!-- ── 4×3 inch label (384×288 px at 96dpi) ── -->

<!-- ── Outer Border ── -->
<rect x="3" y="3" width="378" height="282" rx="6" fill="none" stroke="black" stroke-width="1.5"/>
<rect x="5" y="5" width="374" height="278" rx="5" fill="none" stroke="black" stroke-width="0.4"/>

<!-- ── Header Bar ── -->
<rect x="8" y="8" width="368" height="32" rx="4" fill="black"/>
<text x="192" y="22" text-anchor="middle"
  style="font-size:10px;font-family:Arial,sans-serif;font-weight:bold;fill:#ffffff;letter-spacing:1.5px">BOX PACKING — {{Warehouse}}</text>
<text x="192" y="34" text-anchor="middle"
  style="font-size:8px;font-family:'Courier New',monospace;fill:#ffffff">{{PrintDate}}</text>

<!-- ── Divider ── -->
<line x1="8" y1="44" x2="376" y2="44" stroke="black" stroke-width="0.8"/>

<!-- ── QR Code Block (top-left) ── -->
<rect x="10" y="48" width="76" height="76" rx="3" fill="#000000" stroke="#000000" stroke-width="0.4"/>
<g transform="translate(10, 48) scale(0.507)">
  {{BoxQRCode}}
</g>

<!-- ── Info Fields (right of QR) ── -->
<!-- SKU -->
<text x="94" y="57" style="font-size:6px;font-family:Arial,sans-serif;fill:#888888">SKU</text>
<text x="94" y="68" style="font-size:10px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{SkuId}}</text>
<line x1="94" y1="72" x2="370" y2="72" stroke="#cccccc" stroke-width="0.3"/>

<!-- Batch ID -->
<text x="94" y="81" style="font-size:6px;font-family:Arial,sans-serif;fill:#888888">BATCH ID</text>
<text x="94" y="92" style="font-size:9px;font-family:'Courier New',monospace;font-weight:bold;fill:#000000">{{BatchId}}</text>
<line x1="94" y1="96" x2="370" y2="96" stroke="#cccccc" stroke-width="0.3"/>

<!-- Plant + Batch Size (side by side) -->
<text x="94" y="105" style="font-size:6px;font-family:Arial,sans-serif;fill:#888888">PLANT</text>
<text x="94" y="116" style="font-size:9px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{Plant}}</text>
<line x1="240" y1="98" x2="240" y2="122" stroke="#cccccc" stroke-width="0.3"/>
<text x="248" y="105" style="font-size:6px;font-family:Arial,sans-serif;fill:#888888">BATCH SIZE</text>
<text x="248" y="116" style="font-size:9px;font-family:Arial,sans-serif;font-weight:bold;fill:#000000">{{BatchSize}} kg</text>

<!-- ── Main Divider ── -->
<line x1="8" y1="126" x2="376" y2="126" stroke="black" stroke-width="0.8"/>

<!-- ── Pre-Batch List Header bar ── -->
<rect x="8" y="128" width="368" height="14" fill="#000000"/>
<text x="14" y="139" style="font-size:8px;font-family:Arial,sans-serif;font-weight:normal;fill:#ffffff">Pre-Batch Packing List</text>
<text x="370" y="139" text-anchor="end" style="font-size:8px;font-family:Arial,sans-serif;fill:#ffffff">Volume (kg)</text>

<!-- ── Pre-Batch Rows (injected at print time) ── -->
{{PreBatchRows}}

<!-- ── Footer line ── -->
<line x1="8" y1="255" x2="376" y2="255" stroke="#000000" stroke-width="1"/>

<!-- ── Total Weight bar ── -->
<rect x="8" y="257" width="368" height="18" rx="3" fill="#000000"/>
<text x="14" y="270" style="font-weight:bold;font-size:7px;font-family:Arial,sans-serif;fill:#ffffff">TOTAL NET WEIGHT</text>
<text x="370" y="270" text-anchor="end" style="font-weight:bold;font-size:11px;font-family:Arial,sans-serif;fill:#ffffff">{{TotalNetWeight}} kg</text>

<!-- ── Footer credit ── -->
<text x="370" y="283" text-anchor="end" style="font-size:6px;font-family:'Courier New',monospace;fill:#888888">xDev.co.th</text>
</svg>
